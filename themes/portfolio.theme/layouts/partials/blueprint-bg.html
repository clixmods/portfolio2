{{- /* Fond décoratif « maquette / blueprint » : wireframes, annotations, flèches */ -}}
<div class="bp-bg" aria-hidden="true">
  <svg class="bp-overlay" viewBox="0 0 1440 900" fill="none" preserveAspectRatio="xMidYMin slice"
       xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="bp-arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0 0 L6 3 L0 6 Z" fill="currentColor" />
      </marker>
    </defs>

    {{/* Wireframe carte (gauche) */}}
    <g stroke="currentColor" stroke-width="1.2" opacity="0.8">
      <rect x="70" y="120" width="220" height="150" rx="10" />
      <rect x="88" y="138" width="70" height="46" rx="6" stroke-dasharray="4 4" />
      <line x1="170" y1="146" x2="270" y2="146" />
      <line x1="170" y1="162" x2="250" y2="162" />
      <line x1="170" y1="178" x2="262" y2="178" />
      <line x1="88" y1="210" x2="272" y2="210" />
      <circle cx="100" cy="232" r="8" />
      <line x1="118" y1="232" x2="210" y2="232" />
    </g>

    {{/* Annotation + flèche */}}
    <g stroke="currentColor" stroke-width="1.1" opacity="0.6">
      <path d="M300 150 C 340 150, 350 110, 392 110" stroke-dasharray="3 5" marker-end="url(#bp-arrow)" />
      <text x="300" y="100" font-family="monospace" font-size="13" fill="currentColor" stroke="none">hero / glass</text>
    </g>

    {{/* Cube filaire 3D (droite) */}}
    <g stroke="currentColor" stroke-width="1.2" opacity="0.7" transform="translate(1140 110)">
      <path d="M0 60 L80 20 L200 60 L120 100 Z" />
      <path d="M0 60 L0 160 L120 200 L120 100" />
      <path d="M120 100 L200 60 L200 160 L120 200" />
      <line x1="0" y1="60" x2="120" y2="100" stroke-dasharray="4 4" opacity="0.5" />
    </g>

    {{/* Repères / cotes */}}
    <g stroke="currentColor" stroke-width="1" opacity="0.5">
      <line x1="70" y1="330" x2="430" y2="330" marker-start="url(#bp-arrow)" marker-end="url(#bp-arrow)" />
      <line x1="70" y1="322" x2="70" y2="338" />
      <line x1="430" y1="322" x2="430" y2="338" />
      <text x="232" y="322" font-family="monospace" font-size="11" fill="currentColor" stroke="none">1200px</text>
    </g>

    {{/* Petits schémas dispersés */}}
    <g stroke="currentColor" stroke-width="1.1" opacity="0.55">
      <circle cx="760" cy="180" r="34" stroke-dasharray="5 5" />
      <path d="M745 180 L770 165 L770 195 Z" fill="currentColor" stroke="none" opacity="0.4" />
      <rect x="980" y="320" width="120" height="70" rx="8" stroke-dasharray="4 4" />
      <line x1="996" y1="340" x2="1084" y2="340" />
      <line x1="996" y1="356" x2="1060" y2="356" />
      <path d="M520 420 C 560 380, 620 460, 680 410" stroke-dasharray="3 6" />
    </g>
  </svg>
</div>
<div class="bp-vignette" aria-hidden="true"></div>
