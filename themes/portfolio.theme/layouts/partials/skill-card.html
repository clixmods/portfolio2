{{- /* Carte de compétence. Contexte = dict { key, desc }. */ -}}
{{- $key := .key -}}
{{- $t := partial "tech-resolve.html" $key -}}
{{- $desc := .desc -}}
<div class="skill-card{{ if not $desc }} no-desc{{ end }}">
  {{ partial "tech-icon.html" $t }}
  <div class="skill-card-body">
    <div class="skill-card-name">{{ $t.label }}</div>
    {{- with $desc }}<div class="skill-card-desc">{{ . | safeHTML }}</div>{{ end }}
  </div>
</div>
