{{- /* Rend une rangée de .proj-chip à partir d'une slice de clés tech. Contexte = slice de clés. */ -}}
<div class="proj-chips">
  {{- range . }}
  {{- $t := partial "tech-resolve.html" . }}
  <span class="proj-chip">{{ if $t.iconPath }}<img class="proj-chip-ico" src="{{ $t.iconPath | relURL }}" alt="" width="16" height="16" loading="lazy">{{ else }}{{ with $t.icon }}<span class="proj-chip-ico">{{ . }}</span>{{ end }}{{ end }}{{ $t.label }}</span>
  {{- end }}
</div>
