{{ define "main" }}
{{- $page := .page -}}
<section class="section page-shell">
  <div class="container">
    <div class="page-head reveal">
      <span class="page-kicker">{{ $page.Section | humanize }}</span>
      <h1>{{ $page.Title }}</h1>
      {{- with $page.Params.subtitle }}<p class="page-lead">{{ . }}</p>
      {{- else }}{{ with $page.Description }}<p class="page-lead">{{ . }}</p>{{ end }}{{ end }}
    </div>
    <article class="prose-card reveal">
      <div class="prose">
        {{ $page.Content }}
      </div>
    </article>
    <p style="margin-top:28px">
      <a class="btn btn-ghost" href="{{ relLangURL "/" }}">← {{ i18n "ui_back_home" }}</a>
    </p>
  </div>
</section>
{{ end }}
