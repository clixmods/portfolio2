baseURL = 'https://clixmods.github.io/'
theme = 'portfolio.theme'

# Build configuration
buildDrafts = false
buildFuture = false

# Multilingual configuration
defaultContentLanguage = 'fr'
# Keep French at root, English under /en/
defaultContentLanguageInSubdir = false

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[languages]
	[languages.fr]
		languageName = 'Français'
        languageCode = 'fr-fr'
        weight = 1
        title = "Portfolio - Clément 'Clix' GARCIA"
    [languages.en]
      languageName = 'English'
      languageCode = 'en-us'
      weight = 2
      title = "Portfolio - Clément 'Clix' GARCIA"
    
# Image processing defaults (quality is passed explicitly by get-optimized-image.html)
[imaging]
  resampleFilter = "Lanczos"

# Module mounts - Allow Hugo to process static images as resources
[module]
  [[module.mounts]]
    source = "static/images"
    target = "assets/images"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "assets"
    target = "assets"

# Optional: surface missing i18n keys during development
# enableMissingTranslationPlaceholders = true